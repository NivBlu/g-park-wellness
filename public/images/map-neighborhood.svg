<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="Heebo, Assistant, sans-serif">
  <defs>
    <linearGradient id="park-fill" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2D6B3F"/>
      <stop offset="40%" stop-color="#357A4A"/>
      <stop offset="100%" stop-color="#2A5E38"/>
    </linearGradient>
    <linearGradient id="park-fill2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A8050"/>
      <stop offset="100%" stop-color="#2D6B3F"/>
    </linearGradient>
    <linearGradient id="dev-zone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8B88A"/>
      <stop offset="100%" stop-color="#B8A87A"/>
    </linearGradient>
    <linearGradient id="gpark-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3B32"/>
      <stop offset="100%" stop-color="#1E2821"/>
    </linearGradient>
    <filter id="pin-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1E2821" flood-opacity="0.3"/>
    </filter>
    <filter id="label-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <pattern id="tree-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="5.5" fill="#246535" opacity="0.45"/>
    </pattern>
    <pattern id="tree-dots2" x="8" y="8" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="8" fill="#1D5A2E" opacity="0.3"/>
    </pattern>
  </defs>

