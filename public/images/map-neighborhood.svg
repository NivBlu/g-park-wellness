  <rect x="42" y="0" width="16" height="900" fill="#6A645A"/>
  <line x1="50" y1="0" x2="50" y2="900" stroke="#B8A87A" stroke-width="1.5" stroke-dasharray="20 12" opacity="0.4"/>
  <!-- Highway label -->
  <text transform="translate(28,600) rotate(-90)" fill="#D8D0C0" font-size="11" font-weight="300" letter-spacing="4" opacity="0.7">AYALON — אילון צפון</text>

