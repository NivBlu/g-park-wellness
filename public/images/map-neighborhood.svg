  <path d="M 100 0 L 1400 0 L 1400 420 L 100 420 Z" fill="url(#park-fill)"/>
  <!-- Tree texture -->
  <path d="M 100 0 L 1400 0 L 1400 420 L 100 420 Z" fill="url(#tree-dots)"/>
  <path d="M 100 0 L 1400 0 L 1400 420 L 100 420 Z" fill="url(#tree-dots2)"/>
