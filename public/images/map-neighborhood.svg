  <circle cx="320" cy="70" r="20" fill="#246535" opacity="0.4"/>
  <circle cx="480" cy="130" r="18" fill="#1D5A2E" opacity="0.45"/>
  <circle cx="620" cy="80" r="22" fill="#246535" opacity="0.35"/>
