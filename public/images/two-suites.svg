<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750" font-family="Heebo, Assistant, sans-serif">
  <defs>
    <!-- Wall fill hatching (45-degree diagonal lines for walls, architectural standard) -->
    <pattern id="wall-hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#3A3A38" stroke-width="0.8"/>
    </pattern>
    <!-- Suite 1 tint -->
    <linearGradient id="suite1-tint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F0E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#DDE8DD" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Suite 2 tint -->
    <linearGradient id="suite2-tint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E8DD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8DDD0" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Dimension line marker -->
    <marker id="dim-end" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#888" stroke-width="0.6"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#888" stroke-width="0.6"/>
    </marker>
  </defs>

  <!-- Background — clean white like architectural drawing -->
  <rect width="1000" height="750" fill="#FAFAF8"/>

  <!-- Title block (top-right, architectural style) -->
  <rect x="690" y="15" width="295" height="55" fill="none" stroke="#AAA" stroke-width="0.5"/>
  <line x1="690" y1="38" x2="985" y2="38" stroke="#AAA" stroke-width="0.5"/>
  <text x="838" y="32" text-anchor="middle" fill="#2A3B32" font-size="12" font-weight="500" letter-spacing="2">G PARK WELLNESS LIVING</text>
  <text x="838" y="52" text-anchor="middle" fill="#888" font-size="9" font-weight="300" letter-spacing="2">תשריט עקרוני · קונספט ״שתי הסוויטות״</text>

  <!-- ═══ OUTER WALLS (thick) ═══ -->
  <!-- Apartment boundary: x=80, y=90, w=820, h=550 -->
  <!-- Outer wall — double line (architectural convention) -->
  <rect x="80" y="90" width="820" height="550" fill="#FAFAF8" stroke="#2A2A28" stroke-width="6"/>
  <rect x="83" y="93" width="814" height="544" fill="none" stroke="#FAFAF8" stroke-width="1.5"/>

  <!-- ═══ SUITE 1 ZONE TINT ═══ -->
  <!-- Master bedroom + bathroom -->
  <rect x="83" y="93" width="465" height="330" fill="url(#suite1-tint)"/>

  <!-- ═══ SUITE 2 ZONE TINT ═══ -->
  <!-- Mamad + bathroom -->
  <rect x="83" y="425" width="465" height="212" fill="url(#suite2-tint)"/>

  <!-- ═══ INTERIOR WALLS ═══ -->
  <!-- Main vertical wall (bedroom zone | living zone) -->
  <rect x="545" y="90" width="12" height="550" fill="url(#wall-hatch)" stroke="#2A2A28" stroke-width="1"/>
  <!-- Horizontal wall (master area | mamad area) -->
  <rect x="80" y="420" width="477" height="10" fill="url(#wall-hatch)" stroke="#2A2A28" stroke-width="1"/>
  <!-- Wall between master bed and master bath -->
  <rect x="300" y="90" width="8" height="335" fill="url(#wall-hatch)" stroke="#2A2A28" stroke-width="0.8"/>
  <!-- Wall between mamad and mamad bath -->
  <rect x="300" y="420" width="8" height="220" fill="url(#wall-hatch)" stroke="#2A2A28" stroke-width="0.8"/>

  <!-- ═══ DOORS (quarter-arc, architectural convention) ═══ -->
  <!-- Door: master bed to corridor — gap in wall at y=340 -->
  <rect x="545" y="250" width="12" height="80" fill="#FAFAF8"/>
  <path d="M557 250 Q557 330 477 330" stroke="#2A2A28" stroke-width="0.6" fill="none" stroke-dasharray="2 2"/>
  <!-- Door: master bed to master bath -->
  <rect x="300" y="200" width="8" height="70" fill="#FAFAF8"/>
  <path d="M308 200 Q308 270 238 270" stroke="#2A2A28" stroke-width="0.6" fill="none" stroke-dasharray="2 2"/>
  <!-- Door: mamad to corridor -->
  <rect x="545" y="470" width="12" height="70" fill="#FAFAF8"/>
  <path d="M557 470 Q557 540 487 540" stroke="#2A2A28" stroke-width="0.6" fill="none" stroke-dasharray="2 2"/>
  <!-- Door: mamad to mamad bath -->
  <rect x="300" y="470" width="8" height="65" fill="#FAFAF8"/>
  <path d="M308 470 Q308 535 243 535" stroke="#2A2A28" stroke-width="0.6" fill="none" stroke-dasharray="2 2"/>
  <!-- Entrance door -->
  <rect x="895" y="600" width="5" height="40" fill="#FAFAF8"/>
  <rect x="897" y="599" width="4" height="42" fill="#2A2A28"/>
  <path d="M897 600 Q867 600 867 640" stroke="#2A2A28" stroke-width="0.6" fill="none" stroke-dasharray="2 2"/>
  <text x="910" y="625" fill="#888" font-size="8" font-weight="300">כניסה</text>

  <!-- ═══ WINDOWS (thin double lines on outer walls) ═══ -->
  <!-- North wall windows -->
  <g>
    <rect x="120" y="87" width="90" height="6" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
    <rect x="360" y="87" width="100" height="6" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
    <rect x="600" y="87" width="120" height="6" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
    <rect x="780" y="87" width="80" height="6" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
  </g>
  <!-- West wall windows -->
  <rect x="77" y="160" width="6" height="100" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
  <rect x="77" y="470" width="6" height="90" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
  <!-- East wall windows -->
  <rect x="897" y="150" width="6" height="100" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>
  <rect x="897" y="350" width="6" height="100" fill="#B8D8E8" stroke="#6AA" stroke-width="0.5"/>

  <!-- ═══ SUITE 1: MASTER BEDROOM ═══ -->
  <!-- Room label -->
  <text x="440" y="135" text-anchor="middle" fill="#2A3B32" font-size="13" font-weight="400" letter-spacing="1">חדר שינה הורים</text>
  <!-- Double bed -->
  <rect x="360" y="170" width="140" height="110" rx="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <rect x="365" y="175" width="130" height="100" fill="#F0EFED" stroke="#BBB" stroke-width="0.5"/>
  <!-- Headboard -->
  <rect x="360" y="160" width="140" height="14" rx="1" fill="#E0DED8" stroke="#BBB" stroke-width="0.5"/>
  <!-- Pillows -->
  <rect x="370" y="178" width="55" height="22" rx="8" fill="#E8E6E0" stroke="#CCC" stroke-width="0.5"/>
  <rect x="433" y="178" width="55" height="22" rx="8" fill="#E8E6E0" stroke="#CCC" stroke-width="0.5"/>
  <!-- Bedside tables -->
  <rect x="360" y="290" width="30" height="28" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <rect x="472" y="290" width="30" height="28" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <!-- Wardrobe (built-in) -->
  <rect x="360" y="340" width="186" height="28" fill="#F0EFED" stroke="#AAA" stroke-width="0.6"/>
  <line x1="453" y1="340" x2="453" y2="368" stroke="#BBB" stroke-width="0.5"/>
  <text x="430" y="358" text-anchor="middle" fill="#AAA" font-size="7" font-weight="300">ארון קיר</text>

  <!-- ═══ SUITE 1: MASTER BATHROOM ═══ -->
  <text x="190" y="135" text-anchor="middle" fill="#2A3B32" font-size="12" font-weight="400" letter-spacing="1">חדר רחצה הורים</text>
  <!-- Bathtub (oval in rectangle) -->
  <rect x="100" y="155" width="115" height="55" rx="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <ellipse cx="157" cy="182" rx="50" ry="22" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="157" y="187" text-anchor="middle" fill="#BBB" font-size="7">אמבטיה</text>
  <!-- Shower (corner, with glass lines) -->
  <rect x="100" y="225" width="85" height="85" fill="none" stroke="#888" stroke-width="0.8"/>
  <line x1="100" y1="310" x2="185" y2="225" stroke="#AAA" stroke-width="0.4" stroke-dasharray="4 3"/>
  <!-- Shower head dot -->
  <circle cx="130" cy="255" r="5" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="142" y="275" text-anchor="middle" fill="#BBB" font-size="7">מקלחת</text>
  <!-- Double vanity -->
  <rect x="100" y="330" width="140" height="32" fill="none" stroke="#888" stroke-width="0.8"/>
  <ellipse cx="140" cy="346" rx="12" ry="9" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <ellipse cx="200" cy="346" rx="12" ry="9" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="170" y="380" text-anchor="middle" fill="#AAA" font-size="7">כיור כפול</text>
  <!-- WC -->
  <rect x="250" y="325" width="35" height="45" fill="none" stroke="#888" stroke-width="0.8"/>
  <ellipse cx="267" cy="358" rx="12" ry="10" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="267" y="380" text-anchor="middle" fill="#AAA" font-size="7">שירותים</text>

  <!-- ═══ SUITE 2: MAMAD (enlarged safe room) ═══ -->
  <text x="440" y="465" text-anchor="middle" fill="#8B5E3C" font-size="13" font-weight="500" letter-spacing="1">ממ״ד — 15 מ״ר</text>
  <text x="440" y="482" text-anchor="middle" fill="#B0977E" font-size="9" font-weight="300" letter-spacing="0.5">בטון מחוזק 40 ס״מ</text>
  <!-- Mamad thick walls indicator (hatched, darker) -->
  <rect x="308" y="430" width="237" height="4" fill="#AAA" opacity="0.3"/>
  <rect x="545" y="430" width="4" height="207" fill="#AAA" opacity="0.3"/>
  <rect x="308" y="633" width="241" height="4" fill="#AAA" opacity="0.3"/>
  <rect x="305" y="430" width="4" height="207" fill="#AAA" opacity="0.3"/>
  <!-- Single bed / daybed -->
  <rect x="360" y="500" width="130" height="85" rx="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <rect x="365" y="505" width="120" height="75" fill="#F5F3EF" stroke="#CCC" stroke-width="0.4"/>
  <rect x="360" y="490" width="130" height="14" rx="1" fill="#EAE7E0" stroke="#CCC" stroke-width="0.4"/>
  <!-- Desk -->
  <rect x="360" y="600" width="90" height="30" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="405" y="620" text-anchor="middle" fill="#AAA" font-size="7">שולחן</text>

  <!-- ═══ SUITE 2: MAMAD BATHROOM ═══ -->
  <text x="190" y="465" text-anchor="middle" fill="#8B5E3C" font-size="12" font-weight="500" letter-spacing="1">חדר רחצה ממ״ד</text>
  <!-- Shower -->
  <rect x="100" y="490" width="80" height="80" fill="none" stroke="#888" stroke-width="0.8"/>
  <line x1="100" y1="570" x2="180" y2="490" stroke="#AAA" stroke-width="0.4" stroke-dasharray="4 3"/>
  <circle cx="130" cy="520" r="5" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="140" y="540" text-anchor="middle" fill="#BBB" font-size="7">מקלחת</text>
  <!-- Vanity -->
  <rect x="100" y="585" width="85" height="30" fill="none" stroke="#888" stroke-width="0.8"/>
  <ellipse cx="142" cy="600" rx="12" ry="9" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="142" y="628" text-anchor="middle" fill="#AAA" font-size="7">כיור</text>
  <!-- WC -->
  <rect x="200" y="575" width="35" height="45" fill="none" stroke="#888" stroke-width="0.8"/>
  <ellipse cx="217" cy="608" rx="12" ry="10" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="217" y="630" text-anchor="middle" fill="#AAA" font-size="7">שירותים</text>

  <!-- ═══ LIVING + KITCHEN AREA (right side) ═══ -->
  <!-- Horizontal wall separating kitchen from living in right zone -->
  <rect x="557" y="380" width="343" height="8" fill="url(#wall-hatch)" stroke="#2A2A28" stroke-width="0.6"/>

  <!-- Living room -->
  <text x="730" y="135" text-anchor="middle" fill="#555" font-size="13" font-weight="300" letter-spacing="1">סלון</text>
  <!-- Sofa (L-shape) -->
  <rect x="610" y="180" width="180" height="55" rx="2" fill="none" stroke="#AAA" stroke-width="0.7"/>
  <rect x="610" y="180" width="180" height="15" rx="2" fill="#EEEDEA" stroke="#CCC" stroke-width="0.4"/>
  <rect x="775" y="180" width="15" height="55" rx="2" fill="#EEEDEA" stroke="#CCC" stroke-width="0.4"/>
  <!-- Coffee table -->
  <rect x="650" y="250" width="80" height="45" rx="1" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <!-- TV unit on wall -->
  <rect x="620" y="310" width="160" height="10" fill="#E8E6E0" stroke="#BBB" stroke-width="0.5"/>
  <text x="700" y="345" text-anchor="middle" fill="#BBB" font-size="7">יחידת טלוויזיה</text>

  <!-- Kitchen -->
  <text x="730" y="420" text-anchor="middle" fill="#555" font-size="13" font-weight="300" letter-spacing="1">מטבח</text>
  <!-- Kitchen counter (L-shape along walls) -->
  <rect x="570" y="395" width="315" height="25" fill="#EEEDEA" stroke="#AAA" stroke-width="0.6"/>
  <rect x="570" y="420" width="25" height="120" fill="#EEEDEA" stroke="#AAA" stroke-width="0.6"/>
  <!-- Stove burners -->
  <circle cx="640" cy="407" r="5" fill="none" stroke="#999" stroke-width="0.5"/>
  <circle cx="660" cy="407" r="5" fill="none" stroke="#999" stroke-width="0.5"/>
  <circle cx="680" cy="407" r="5" fill="none" stroke="#999" stroke-width="0.5"/>
  <circle cx="700" cy="407" r="5" fill="none" stroke="#999" stroke-width="0.5"/>
  <!-- Sink -->
  <rect x="760" y="398" width="40" height="18" rx="4" fill="none" stroke="#999" stroke-width="0.5"/>
  <!-- Fridge -->
  <rect x="845" y="395" width="40" height="50" fill="#EEEDEA" stroke="#AAA" stroke-width="0.6"/>
  <text x="865" y="425" text-anchor="middle" fill="#BBB" font-size="6">מקרר</text>
  <!-- Kitchen island -->
  <rect x="640" y="460" width="150" height="40" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <text x="715" y="485" text-anchor="middle" fill="#BBB" font-size="7">אי מטבח</text>
  <!-- Dining table -->
  <rect x="640" y="530" width="120" height="70" rx="1" fill="none" stroke="#AAA" stroke-width="0.6"/>
  <!-- Chairs (circles) -->
  <circle cx="660" cy="525" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="700" cy="525" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="740" cy="525" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="660" cy="605" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="700" cy="605" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="740" cy="605" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="635" cy="565" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <circle cx="765" cy="565" r="6" fill="none" stroke="#CCC" stroke-width="0.5"/>
  <text x="700" y="570" text-anchor="middle" fill="#BBB" font-size="7">פינת אוכל</text>

  <!-- ═══ BALCONY (dashed outline below living) ═══ -->
  <rect x="557" y="640" width="343" height="55" fill="none" stroke="#2A3B32" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="730" y="672" text-anchor="middle" fill="#2A3B32" font-size="10" font-weight="300" letter-spacing="2">מרפסת שמש — נוף לפארק</text>

  <!-- ═══ DIMENSION LINES ═══ -->
  <!-- Top dimension — full width -->
  <line x1="80" y1="72" x2="900" y2="72" stroke="#888" stroke-width="0.5"/>
  <line x1="80" y1="68" x2="80" y2="76" stroke="#888" stroke-width="0.5"/>
  <line x1="900" y1="68" x2="900" y2="76" stroke="#888" stroke-width="0.5"/>
  <text x="490" y="68" text-anchor="middle" fill="#888" font-size="8" font-weight="300">1420</text>

  <!-- Left dimension — full height -->
  <line x1="62" y1="90" x2="62" y2="640" stroke="#888" stroke-width="0.5"/>
  <line x1="58" y1="90" x2="66" y2="90" stroke="#888" stroke-width="0.5"/>
  <line x1="58" y1="640" x2="66" y2="640" stroke="#888" stroke-width="0.5"/>
  <text x="55" y="370" text-anchor="middle" fill="#888" font-size="8" font-weight="300" transform="rotate(-90, 55, 370)">950</text>

  <!-- Suite 1 dimension -->
  <line x1="83" y1="405" x2="545" y2="405" stroke="#3A6B35" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="314" y="400" text-anchor="middle" fill="#3A6B35" font-size="8" font-weight="400">סוויטה ראשונה</text>

  <!-- Suite 2 dimension -->
  <line x1="83" y1="640" x2="545" y2="640" stroke="#A58B75" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="314" y="648" text-anchor="middle" fill="#A58B75" font-size="8" font-weight="400">סוויטה שנייה</text>

  <!-- ═══ SUITE INDICATORS (side brackets) ═══ -->
  <!-- Suite 1 bracket -->
  <path d="M32 93 L22 93 L22 420 L32 420" fill="none" stroke="#2A3B32" stroke-width="1.5"/>
  <text x="27" y="260" text-anchor="middle" fill="#2A3B32" font-size="9" font-weight="400" letter-spacing="2" transform="rotate(-90, 27, 260)">SUITE 1</text>

  <!-- Suite 2 bracket -->
  <path d="M32 430 L22 430 L22 637 L32 637" fill="none" stroke="#A58B75" stroke-width="1.5"/>
  <text x="27" y="535" text-anchor="middle" fill="#A58B75" font-size="9" font-weight="400" letter-spacing="2" transform="rotate(-90, 27, 535)">SUITE 2</text>

  <!-- ═══ LEGEND ═══ -->
  <g transform="translate(80, 715)">
    <rect x="0" y="-10" width="16" height="12" fill="#E8F0E8" stroke="#2A3B32" stroke-width="0.8" opacity="0.8"/>
    <text x="22" y="0" fill="#2A3B32" font-size="10" font-weight="400" letter-spacing="0.5">סוויטה 1 — חדר הורים + חדר רחצה פרטי</text>

    <rect x="340" y="-10" width="16" height="12" fill="#F0E8DD" stroke="#A58B75" stroke-width="0.8" opacity="0.8"/>
    <text x="362" y="0" fill="#8B5E3C" font-size="10" font-weight="400" letter-spacing="0.5">סוויטה 2 — ממ״ד 15 מ״ר + חדר רחצה פרטי</text>
  </g>

  <!-- Scale -->
  <g transform="translate(830, 710)">
    <text x="0" y="0" fill="#AAA" font-size="8" font-weight="300">1:100</text>
    <line x1="50" y1="-3" x2="130" y2="-3" stroke="#AAA" stroke-width="1"/>
    <line x1="50" y1="-7" x2="50" y2="1" stroke="#AAA" stroke-width="0.5"/>
    <line x1="130" y1="-7" x2="130" y2="1" stroke="#AAA" stroke-width="0.5"/>
    <text x="90" y="10" text-anchor="middle" fill="#AAA" font-size="7" font-weight="300">5 מ׳</text>
  </g>

  <!-- Compass -->
  <g transform="translate(960, 710)">
    <polygon points="0,-14 4,0 0,3 -4,0" fill="#2A3B32"/>
    <polygon points="0,14 4,0 0,-3 -4,0" fill="#CCC"/>
    <text x="0" y="-18" text-anchor="middle" fill="#2A3B32" font-size="7" font-weight="500">N</text>
  </g>
</svg>
